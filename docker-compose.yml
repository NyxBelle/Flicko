version: "3.9"

services:
  backend:
    build: ./backend
    container_name: flicko_backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - tmp_videos:/tmp/flicko

  worker:
    build: ./backend
    container_name: flicko_worker
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - tmp_videos:/tmp/flicko

  db:
    image: postgres:15
    container_name: flicko_db
    environment:
      POSTGRES_DB: flicko
      POSTGRES_USER: flicko_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: flicko_redis
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    container_name: flicko_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  tmp_videos:
