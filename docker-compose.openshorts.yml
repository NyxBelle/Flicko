version: "3.9"

# OpenShorts — AI transcription + face-tracked 9:16 clip generation
# Run from the Flicko root directory:
#   docker compose -f docker-compose.openshorts.yml up --build
#
# Assumes OpenShorts is cloned adjacent to Flicko:
#   C:\Users\HomePC\Documents\OpenShorts   (clone of github.com/mutonby/openshorts)
#   C:\Users\HomePC\Documents\Flicko       (this project)
#
# Note: The Gemini API key is NOT in the .env — it is passed per-request
# in the X-Gemini-Key header by the Flicko worker. No key needed here.

services:
  openshorts:
    build:
      context: ../OpenShorts
      dockerfile: Dockerfile
    container_name: flicko_openshorts
    ports:
      - "8000:8000"
    environment:
      MAX_CONCURRENT_JOBS: "3"
      # S3 is not used — Flicko handles all storage via Supabase
      AWS_ACCESS_KEY_ID: "unused"
      AWS_SECRET_ACCESS_KEY: "unused"
      AWS_REGION: "us-east-1"
      AWS_S3_BUCKET: "unused"
      AWS_S3_PUBLIC_BUCKET: "unused"
    volumes:
      - openshorts_output:/app/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  openshorts_output:
